name: Release Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package*.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'Dockerfile'
      - 'nginx.conf'
      - '.github/workflows/release-docker.yml'
    tags:
      - 'release-docker/v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  call-docker-release:
    uses: OperationsPAI/shared-workflows/.github/workflows/release-docker.yml@main
    if: github.ref_type == 'tag' || github.ref == 'refs/heads/main'
    with:
      caller: ${{ github.event.repository.name }}
      volces-name: pair/rcabench-frontend
      tag-push: ${{ startsWith(github.ref, 'refs/tags/release-docker') }}
      tag-prefix: "release-docker/"
    secrets: inherit
